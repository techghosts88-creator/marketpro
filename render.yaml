services:
  # ---- Backend: Express + Prisma REST API ----
  - type: web
    name: marketpro-backend
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_VERSION
        value: 20

  # ---- Frontend: Vite static build ----
  - type: web
    name: marketpro-frontend
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      # Single-page app: let React handle all routes.
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
